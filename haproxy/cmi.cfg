global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    ssl-default-bind-ciphers PROFILE=SYSTEM
    ssl-default-bind-options no-sslv3

defaults
    log     global
    mode    tcp
    option  tcplog             # ✔ 修复：全 TCP 代理模式下，默认使用 tcplog 避免报警
    option  dontlognull
    option  redispatch         # 在服务器不可用时重新分配请求
    retries 3                  # 在重新分配之前重试次数
    timeout connect 5000ms
    timeout client  300000ms   # 客户端空闲超时：300秒
    timeout server  300000ms   # 服务器空闲超时：300秒
    timeout http-keep-alive 300s  
    timeout check 5s           # 健康检查超时时间
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

    


frontend naive_in
    bind :::443 v4v6
    mode tcp
    
    # 延迟等待 TLS 握手包，以便提取 SNI 域名
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    # 根据不同的域名（SNI）分流到对应的后端
    use_backend bk_sf1       if { req_ssl_sni -i us1.sswnat.com }
    use_backend bk_us1       if { req_ssl_sni -i us-west1.sswnat.com }
    use_backend bk_us3          if { req_ssl_sni -i us3.sswnat.com }
    use_backend bk_us_east1     if { req_ssl_sni -i us-east1.sswnat.com }
    use_backend bk_localhost     if { req_ssl_sni -i 4837.sswtran.com }
    use_backend bk_localhost     if { req_ssl_sni -i 9929.sswtran.com } 
    use_backend bk_localhost     if { req_ssl_sni -i lacmin2.sswtran.com } 
    use_backend bk_localhost     if { req_ssl_sni -i sjcn2.sswtran.com } 
    use_backend bk_localhost     if { req_ssl_sni -i lacn2.sswtran.com } 
    
    backend bk_sf1
    mode tcp
    balance source            
    option tcp-check     
    server server1 ld-sf1.ssw-servers.com:4443 check inter 10s rise 2 fall 3

    backend bk_us1
    mode tcp
    balance source            
    option tcp-check     
    server server1 us-west1.ssw-servers.com:4443 check inter 10s rise 2 fall 3
    server server2 us1.ssw-servers.com:4443 check inter 10s rise 2 fall 3

    backend bk_us3
    mode tcp
    balance source            
    option tcp-check     
    server server1 us3.ssw-servers.com:4443 check inter 10s rise 2 fall 3
    
    backend bk_us_east1
    mode tcp
    balance source            
    option tcp-check     
    server server1 us-east1.ssw-servers.com:4443 check inter 10s rise 2 fall 3

    backend bk_localhost
    mode tcp
    balance source            
    option tcp-check     
    server server1 127.0.0.1:4443 check inter 10s rise 2 fall 3
